name: EPGO

on:
  schedule:
    - cron: '15 16 * * *'
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
 
    - name: 设置Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 生成EPG节目单
      env:
        CCTV_API_URL: ${{ secrets.CCTV_API_URL }}
        CCTV_GENERATOR_URL: ${{ secrets.CCTV_GENERATOR_URL }}
        TM_CCTV: ${{ secrets.TM_CCTV }}
        TM_SATELLITE: ${{ secrets.TM_SATELLITE }}
        TM_REFERER: ${{ secrets.TM_REFERER }}
        TM_GENERATOR_URL: ${{ secrets.TM_GENERATOR_URL }}
        B_PROGRAM: ${{ secrets.B_PROGRAM }}
        B_WS: ${{ secrets.B_WS }}
      run: python code/epgo.py
    
    - name: 记录运行结果
      run: |
        echo "EPG生成任务完成"
        echo "当前目录结构："
        ls -la
        echo "输出目录内容："
        ls -la output/

    - name: 提交EPG文件到仓库
      run: |
        # 配置git用户信息
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 检查epg.gz文件是否存在
        if [ -f "output/epg.gz" ]; then
          # 只添加epg.gz文件，使用-f选项强制添加（忽略.gitignore）
          git add -f output/epg.gz
          
          # 检查是否有更改
          if git diff --cached --quiet; then
            echo "没有新的EPG文件需要提交"
          else
            # 提交更改
            git commit -m "自动生成EPG节目单 $(date +'%Y-%m-%d')"
            # 推送更改到仓库
            git push
            echo "EPG文件已成功提交到仓库"
          fi
        else
          echo "没有生成EPG文件"
        fi

    - name: 获取镜像前缀
      id: get-prefix
      run: |
        # 从gfast.txt获取镜像前缀
        PREFIX=$(curl -s https://github.com/jerome158/CHN/raw/refs/heads/main/gitfast/gitfast.txt | head -n 1)
        echo "镜像前缀: $PREFIX"
        echo "prefix=$PREFIX" >> $GITHUB_OUTPUT

    - name: 上传 artifacts
      uses: actions/upload-artifact@v4
      with:
        name: epg-output
        path: output/epg.gz
        retention-days: 1

  deploy:
    needs: generate-epg
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 下载 artifacts
      uses: actions/download-artifact@v4
      with:
        name: epg-output
        path: .

    - name: 获取镜像前缀
      id: get-prefix
      run: |
        PREFIX=$(curl -s https://github.com/jerome158/CHN/raw/refs/heads/main/gitfast/gitfast.txt | head -n 1)
        echo "镜像前缀: $PREFIX"
        echo "prefix=$PREFIX" >> $GITHUB_OUTPUT

    - name: 生成HTML页面
      run: |
        # 获取当前仓库的owner作为GitHub用户名
        REPO_OWNER=${GITHUB_REPOSITORY%%/*}
        EPG_URL="https://${REPO_OWNER}.github.io/${GITHUB_REPOSITORY##*/}/output/epg.gz"
        FULL_URL="${{ steps.get-prefix.outputs.prefix }}${EPG_URL}"
        
        # 生成HTML文件
        cat > index.html << EOF
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>EPG 节目单下载</title>
            <style>
                body {
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 20px;
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    min-height: 100vh;
                }
                .container {
                    background: white;
                    border-radius: 12px;
                    padding: 30px;
                    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
                }
                h1 {
                    color: #333;
                    text-align: center;
                    margin-bottom: 30px;
                }
                .download-section {
                    text-align: center;
                    padding: 20px;
                }
                .download-btn {
                    display: inline-block;
                    padding: 15px 40px;
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white;
                    text-decoration: none;
                    border-radius: 8px;
                    font-size: 18px;
                    transition: transform 0.2s, box-shadow 0.2s;
                }
                .download-btn:hover {
                    transform: translateY(-2px);
                    box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
                }
                .url-info {
                    margin-top: 20px;
                    padding: 15px;
                    background: #f5f5f5;
                    border-radius: 8px;
                    word-break: break-all;
                }
                .url-info label {
                    font-weight: bold;
                    color: #666;
                }
                .url-info code {
                    display: block;
                    margin-top: 8px;
                    color: #333;
                    font-size: 14px;
                }
                .update-time {
                    text-align: center;
                    margin-top: 20px;
                    color: #999;
                    font-size: 14px;
                }
            </style>
        </head>
        <body>
            <div class="container">
                <h1>📺 EPG 节目单下载</h1>
                <div class="download-section">
                    <a href="$FULL_URL" class="download-btn" download>下载 EPG 文件 (epg.gz)</a>
                    <div class="url-info">
                        <label>直链地址：</label>
                        <code>$FULL_URL</code>
                    </div>
                </div>
                <div class="update-time">
                    更新时间：$(date +'%Y-%m-%d %H:%M:%S')
                </div>
            </div>
        </body>
        </html>
        EOF
        echo "HTML页面已生成"

    - name: 部署到 GitHub Pages
      run: |
        # 配置git用户信息
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 尝试克隆gh-pages分支，如果不存在则创建
        git checkout gh-pages 2>/dev/null || git checkout -b gh-pages
        
        # 复制文件
        cp index.html ./
        if [ -f epg.gz ]; then
          mkdir -p output
          cp epg.gz output/
        fi
        
        # 添加并提交
        git add .
        git commit -m "更新EPG下载页面 $(date +'%Y-%m-%d')" || echo "没有更改需要提交"
        
        # 推送到gh-pages
        git push --force origin gh-pages
