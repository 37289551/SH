name: CTWS Test CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ctws.py'
      - 'model/test_ctws.py'
      - '.github/workflows/test_ctws.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ctws.py'
      - 'model/test_ctws.py'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '测试模式'
        required: true
        default: 'ci'
        type: choice
        options:
          - ci
          - api
          - full

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run CI tests (fast, no API calls)
      if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.test_mode == 'ci')
      run: |
        python model/test_ctws.py --ci

    - name: Run API discovery tests
      if: github.event_name == 'workflow_dispatch' && inputs.test_mode == 'api'
      run: |
        python model/test_ctws.py --api-test

    - name: Run full tests (with API calls)
      if: github.event_name == 'workflow_dispatch' && inputs.test_mode == 'full'
      run: |
        python model/test_ctws.py --full

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-py${{ matrix.python-version }}
        path: |
          output/
          *.xml
          *.log
        retention-days: 7

    - name: Report test status
      if: always()
      run: |
        if [ $? -eq 0 ]; then
          echo "✅ Tests passed on Python ${{ matrix.python-version }}"
        else
          echo "❌ Tests failed on Python ${{ matrix.python-version }}"
          exit 1
        fi
